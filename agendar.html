<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Agendamento</title>

  <link rel="stylesheet" href="/css/style.css">
   <link rel="icon" type="image/png" href="../imgs/logo.png">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  
</head>

<body class="imginicial">

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container-fluid">

      <a class="navbar-brand" href="inicial.html">

        <img 
          src="../imgs/logo.png" 
          alt="Brownie da ENF"
          class="logo-navbar"
        >

      </a>

      <button 
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#menu"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="menu">

        <ul class="navbar-nav ms-auto align-items-center">

          <li class="nav-item">
            <a class="nav-link active" href="inicial.html">
              Página Inicial
            </a>
          </li>

            <li class="nav-item">
            <a 
              class="btn btn-success ms-lg-3 mt-2 mt-lg-0"
              href="pedidos.html"
            >
              Pedidos
            </a>
          </li>

          <li class="nav-item">
            <a 
              class="btn btn-danger ms-lg-3 mt-2 mt-lg-0"
              href="login.html"
            >
              Sair
            </a>
          </li>

          

        </ul>

      </div>

    </div>

  </nav>

  <div class="container mt-5">

  <div class="card_agendamento">

    <img 
      src="../imgs/brownieoreo.png"
      class="img_agendamento"
    >

    <h1>Brownie de Oreo</h1>

    <p>
      Brownie artesanal com recheio de chocolate branco
      e pedaços de Oreo.
    </p>


    <!-- Nome -->
    <label class="mt-3">Seu nome <span class="obrigatorio">*</span></label>

    <input
  id="nome"
  type="text"
  class="form-control mt-1"
  placeholder="Digite seu nome..."
  oninput="this.value = this.value.replace(/[^A-Za-zÀ-ÿ\s]/g, '')"
  required
>

<div class="mt-3">

    <!-- QUANTIDADE -->
    <label>
        Quantidade <span class="obrigatorio">*</span>
    </label>

    <input id="quantidade"
      type="number"
      min="1"
      value="1"
      max="12"
      class="form-control"
      required
    >

    <!-- DATA -->
    <label class="mt-3">Data <span class="obrigatorio">*</span></label>

    <input id="data"
      type="date"
      class="form-control"
      required
    >

    <!-- HORÁRIO -->
    <label class="mt-3">Horário <span class="obrigatorio">*</span></label>

    <input id="horario"
      type="time"
      class="form-control"
      required
    >

    <!-- OBS -->
    <label class="mt-3">Observações</label>

    <textarea id="observacao"
      class="form-control"
      rows="4"
      placeholder="Digite algo..."
    ></textarea>
    </div>

    <button id="btnAgendamento" class="btn btn-warning mt-4 fw-bold">
      🍪 Confirmar Agendamento
    </button>



  </div>

</div>

<script type="module" src="../jss/agendar.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</body>

</html>

<!DOCTYPE html>
<html lang="pt-br">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Agendamento</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/navbar.css">
  <link rel="stylesheet" href="css/inicial.css">
  <link rel="stylesheet" href="css/agendar.css">

  <!-- BOOTSTRAP -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- FONT -->
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <!-- ÍCONE -->
  <link rel="icon" type="image/png" href="imgs/logo.png">

</head>

<body class="imginicial" style="display: none;">

  <!-- NAVBAR -->
  <nav class="navbar navbar-dark">
    <div class="container-fluid">

      <a class="navbar-brand" href="inicial.html">
        <img src="imgs/logo.png" alt="Brownie da ENF" class="logo-navbar">
      </a>

      <div class="nav-drawer" id="navDrawer">
        <button class="nav-drawer-close" id="navDrawerClose">✕</button>
        <span id="nomeUsuario" class="nav-usuario"></span>
        <div id="itemAdmin" class="d-none">
          <a id="btnAdmin" class="nav-btn nav-btn-admin" href="admin.html">Admin</a>
        </div>
        <a class="nav-link" href="inicial.html">Página Inicial</a>
        <a class="nav-btn" href="pedidos.html">Pedidos</a>
        <button class="nav-btn nav-btn-danger" id="btnSair">Sair</button>
      </div>

      <button class="nav-hamburger" id="navHamburger">
        <span></span><span></span><span></span>
      </button>

    </div>
  </nav>

  <!-- OVERLAY -->
  <div class="nav-overlay" id="navOverlay"></div>

  <!-- CONTEÚDO -->
  <div class="container mt-5">

    <div class="card_agendamento">

      <img src="imgs/brownieoreo.png" class="img_agendamento" alt="Brownie de Oreo">

      <h1>Brownie de Oreo</h1>

      <p>
        Brownie artesanal com recheio de chocolate branco
        e pedaços de Oreo.
      </p>

      <!-- NOME -->
      <label class="mt-3">
        Seu nome <span class="obrigatorio">*</span>
      </label>

      <input
        id="nome"
        type="text"
        class="form-control mt-1"
        placeholder="Digite seu nome..."
        oninput="this.value = this.value.replace(/[^A-Za-zÀ-ÿ\s]/g, '')"
        required
      >

      <div class="mt-3">

        <!-- QUANTIDADE -->
        <label>
          Quantidade <span class="obrigatorio">*</span>
        </label>

        <input
          id="quantidade"
          type="number"
          min="1"
          value="1"
          max="12"
          class="form-control"
          onkeydown="return !['e','E','+','-','.',','].includes(event.key)"
          required
        >

        <div class="resumo_preco">

          <span>Total</span>

          <h2 id="precoTotal">R$ 10,00</h2>

        </div>

   <!-- DATA -->
<label class="mt-3">
  Data <span class="obrigatorio">*</span>
</label>

<input
  id="data"
  type="date"
  class="form-control"
  required
  onkeydown="return false"
  onpaste="return false"
>

        <!-- HORÁRIO -->
        <label class="mt-3">
          Horário <span class="obrigatorio">*</span>
        </label>
<input
  id="horario"
  type="time"
  class="form-control"
  min="06:00"
  max="22:00"
  step="900"
  required
>

        <!-- ENDEREÇO -->
<label class="mt-3">
  Localização <span class="obrigatorio">*</span>
</label>

<input
  id="endereco"
  type="text"
  class="form-control"
  placeholder="Aonde você quer o seu Brownie?"
  required
>

<!-- FORMA DE PAGAMENTO -->
<label class="mt-3">
  Forma de pagamento <span class="obrigatorio">*</span>
</label>

<select
  id="formaPagamento"
  class="form-control"
  required
>
  <option value="">
    Selecione uma opção
  </option>

  <option value="PIX">
    PIX
  </option>

  <option value="DINHEIRO">
    Dinheiro
  </option>
</select>

        <!-- OBS -->
        <label class="mt-3">
          Observações
        </label>

        <textarea
          id="observacao"
          class="form-control"
          rows="4"
          placeholder="Digite algo..."
        ></textarea>

      </div>

      <!-- BOTÃO -->
      <button id="btnAgendamento" class="btn btn-warning mt-4 fw-bold">
        Confirmar Agendamento
      </button>

    </div>

  </div>

  <!-- MODAL PIX -->
  <div id="modalPix" class="modal_pix d-none">

    <div class="pix_conteudo">

      <button id="fecharPix" class="fechar_pix">
        ✕
      </button>

      <h2>Pagamento PIX</h2>

      <p class="texto_pix">
        Escaneie o QR Code para finalizar seu pedido 
      </p>

      <div class="caixa_chave_pix">

        <img id="qrCodePix" class="qr_pix">

        <input type="text" id="chavePix" readonly>

        <button id="copiarPix">
          Copiar
        </button>

      </div>

      <button id="btnPago" class="btn btn-success mt-4">
        Já realizei o pagamento
      </button>

    </div>

  </div>

  <!-- SCRIPTS -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

  <script type="module" src="jss/agendar.js"></script>

  <script>
    const _h = document.getElementById('navHamburger');
    const _d = document.getElementById('navDrawer');
    const _o = document.getElementById('navOverlay');
    const _c = document.getElementById('navDrawerClose');
    function _open() { _d.classList.add('aberto'); _o.classList.add('visivel'); }
    function _close() { _d.classList.remove('aberto'); _o.classList.remove('visivel'); }
    _h.addEventListener('click', _open);
    _c.addEventListener('click', _close);
    _o.addEventListener('click', _close);
  </script>

</body>

</html>

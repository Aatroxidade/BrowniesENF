<!DOCTYPE html>
<html lang="pt-br">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Cadastro | Brownies ENF</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/cadastro.css">
  <link rel="stylesheet" href="css/global.css">

  <!-- GOOGLE FONTS -->
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <!-- BOOTSTRAP -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- ÍCONE -->
  <link rel="icon" type="image/png" href="imgs/logo.png">

</head>


<body class="body-login imglogin">

  <div class="bordalogin">

    <!-- LOGO -->
    <img src="imgs/logo.png" alt="Logo Brownies ENF" class="logo-login">

    <!-- TÍTULO -->
    <h1 class="titulo-marca">
      Brownies ENF
    </h1>

    <p class="subtitulo-marca">
      Crie sua conta e faça seus pedidos
    </p>

    <!-- TEXTO -->
    <h2 class="textlogin">
      Cadastro
    </h2>


    <!-- NOME -->
    <label class="label-cadastro">
      Nome <span class="obrigatorio">*</span>
    </label>

    <input class="caixaNomeCadastro" type="text" id="nomeCadastro" placeholder="Digite seu nome"
      oninput="this.value = this.value.replace(/[^A-Za-zÀ-ÿ\s]/g, '')" required>


    <!-- EMAIL -->
    <label class="label-cadastro">
      E-mail <span class="obrigatorio">*</span>
    </label>

    <input class="caixaEmailCadastro" type="email" id="emailCadastro" placeholder="Digite seu email" required>


    <!-- SENHA -->
    <label class="label-cadastro">
      Senha <span class="obrigatorio">*</span>
    </label>

    <div class="senha-container">

      <input class="caixaSenhaCadastro" type="password" id="senhaCadastro" placeholder="Digite sua senha" required>

      <i id="mostrarSenha" class="bi bi-eye-fill icone-senha"></i>
    </div>


    <!-- BOTÃO CADASTRAR -->
    <button class="btn-login" id="btnCadastrar">
      Criar conta
    </button>


    <!-- BOTÃO LOGIN -->
    <button class="btn-criar" id="btnEntrar">
      Fazer login
    </button>


    <!-- ERRO -->
    <p id="erroCadastro"></p>

  </div>


  <!-- SCRIPT -->
  <script type="module" src="jss/cadastro.js"></script>

</body>

</html>

<!DOCTYPE html>
<html lang="pt-br">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Cadastro | Brownies ENF</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- FONTE -->
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <!-- BOOTSTRAP -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- ÍCONE -->
  <link rel="icon" type="image/png" href="logo.png">

</head>

<body class="body-login imglogin">

  <div class="bordalogin">

    <!-- LOGO -->
    <img
      src="logo.png"
      alt="Logo Brownies ENF"
      class="logo-login"
    >

    <!-- TÍTULO -->
    <h1 class="titulo-marca">
      Brownies ENF
    </h1>

    <p class="subtitulo-marca">
      Crie sua conta e faça seus pedidos
    </p>

    <!-- TEXTO -->
    <h2 class="textlogin">
      Cadastro
    </h2>

    <!-- EMAIL -->
    <input
      class="caixaEmailCadastro"
      type="email"
      id="emailCadastro"
      placeholder="Digite seu email"
    >

    <!-- SENHA -->
    <input
      class="caixaSenhaCadastro"
      type="password"
      id="senhaCadastro"
      placeholder="Digite sua senha"
    >

    <!-- BOTÃO CADASTRAR -->
    <button
      class="btn-login"
      id="btnCadastrar"
    >
      Criar conta
    </button>

    <!-- BOTÃO LOGIN -->
    <button
      class="btn-criar"
      id="btnEntrar"
    >
      Fazer login
    </button>

    <!-- ERRO -->
    <p id="erroCadastro"></p>

  </div>

  <!-- SCRIPT -->
  <script type="module" src="cadastro.js"></script>

</body>

</html>

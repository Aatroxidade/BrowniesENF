<!DOCTYPE html>
<html lang="pt-br">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Meus Pedidos | Brownies ENF</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/navbar.css">
  <link rel="stylesheet" href="css/pedidos.css">

  <!-- BOOTSTRAP -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <!-- FONT -->
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap"
    rel="stylesheet"
  >

  <!-- ÍCONE -->
  <link rel="icon" type="image/png" href="imgs/logo.png">

</head>

<body class="imginicial" style="display: none;">

  <!-- NAVBAR -->
  <nav class="navbar navbar-dark">
    <div class="container-fluid">

      <a class="navbar-brand" href="inicial.html">
        <img src="imgs/logo.png" alt="Logo Brownies ENF" class="logo-navbar">
      </a>

      <div class="nav-drawer" id="navDrawer">
        <button class="nav-drawer-close" id="navDrawerClose">✕</button>
        <span id="nomeUsuario" class="nav-usuario"></span>
        <div id="itemAdmin" class="d-none">
          <a id="btnAdmin" class="nav-btn nav-btn-admin" href="admin.html">Admin</a>
        </div>
        <a class="nav-link" href="inicial.html">Página Inicial</a>
        <a id="btnSair" class="nav-btn nav-btn-danger" href="#">Sair</a>
      </div>

      <button class="nav-hamburger" id="navHamburger">
        <span></span><span></span><span></span>
      </button>

    </div>
  </nav>

  <!-- OVERLAY -->
  <div class="nav-overlay" id="navOverlay"></div>

  <!-- CONTEÚDO -->
  <div class="container mt-5">

    <h1 class="titulo text-center">
      Meus Pedidos
    </h1>

    <p class="sejabemvindo text-center">
      Acompanhe seus pedidos em tempo real
    </p>

    <!-- LISTA -->
    <div
      id="listaPedidos"
      class="mt-5"
    ></div>

  </div>

  <!-- SCRIPTS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <script type="module" src="jss/pedidos.js"></script>

  <script>
    const _h = document.getElementById('navHamburger');
    const _d = document.getElementById('navDrawer');
    const _o = document.getElementById('navOverlay');
    const _c = document.getElementById('navDrawerClose');
    function _open() { _d.classList.add('aberto'); _o.classList.add('visivel'); }
    function _close() { _d.classList.remove('aberto'); _o.classList.remove('visivel'); }
    _h.addEventListener('click', _open);
    _c.addEventListener('click', _close);
    _o.addEventListener('click', _close);
  </script>

</body>

</html>

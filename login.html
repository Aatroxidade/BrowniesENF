<!DOCTYPE html>
<html lang="pt-br">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Login | Brownies ENF</title>

  <!-- CSS -->
  <link rel="stylesheet" href="../css/style.css">

  <!-- FONTE -->
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <!-- BOOTSTRAP -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- ÍCONE ABA -->
  <link rel="icon" type="image/png" href="../imgs/logo.png">

</head>

<body class="body-login imglogin">

  <div class="bordalogin">

    <!-- LOGO -->
    <img 
      src="../imgs/logo.png"
      alt="Logo Brownies ENF"
      class="logo-login"
    >

    <!-- TÍTULO -->
    <h1 class="titulo-marca">
      Brownies ENF
    </h1>

    <p class="subtitulo-marca">
      Brownies artesanais feitos com carinho!
    </p>

    <!-- LOGIN -->
    <h2 class="textlogin">
      Login
    </h2>

    <!-- EMAIL -->
    <input
      class="caixaEmail"
      type="email"
      id="nomeUsuario"
      placeholder="Digite seu email"
    >

    <!-- SENHA -->
    <input
      class="caixaSenha"
      type="password"
      id="senhaLogin"
      placeholder="Digite sua senha"
    >

    <!-- BOTÃO LOGIN -->
    <button 
      class="btn-login"
      id="btnLogin"
    >
      Entrar
    </button>

    <!-- BOTÃO CADASTRO -->
    <button
      class="btn-criar"
      id="btnCriarConta"
    >
      Criar conta
    </button>

    <!-- ERRO -->
    <p id="erroLogin"></p>

  </div>

  <!-- SCRIPT LOGIN -->
  <script type="module" src="../jss/login.js"></script>

</body>

</html>

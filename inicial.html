<!DOCTYPE html>
<html lang="pt-br">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Brownie da ENF</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/inicial.css">
  <link rel="stylesheet" href="css/navbar.css">



  <!-- BOOTSTRAP -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- FONTE -->
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">

  <!-- ÍCONE -->
  <link rel="icon" type="image/png" href="imgs/logo.png">

</head>

<body class="imginicial" style="display: none;">

  <!-- NAVBAR -->
  <nav class="navbar navbar-dark">
    <div class="container-fluid">

      <a class="navbar-brand" href="inicial.html">
        <img src="imgs/logo.png" alt="Brownie da ENF" class="logo-navbar">
      </a>

      <div class="nav-drawer" id="navDrawer">
        <button class="nav-drawer-close" id="navDrawerClose">✕</button>
        <span id="nomeUsuario" class="nav-usuario"></span>
        <button class="btn btn-outline-warning btn-sm" id="ativarNotificacao">🔔 Ativar notificações</button>
        <div id="itemAdmin" class="d-none">
          <a id="btnAdmin" class="nav-btn nav-btn-admin" href="admin.html">Admin</a>
        </div>
        <a class="nav-link" href="inicial.html">Página Inicial</a>
        <a class="nav-btn" href="pedidos.html">Pedidos</a>
        <button class="nav-btn nav-btn-danger" id="btnSair">Sair</button>
      </div>

      <button class="nav-hamburger" id="navHamburger">
        <span></span><span></span><span></span>
      </button>

    </div>
  </nav>

  <!-- OVERLAY -->
  <div class="nav-overlay" id="navOverlay"></div>

  <!-- CONTEÚDO -->
  <div class="container text-center mt-4">

    <h1 class="titulo">
      Brownies ENF
    </h1>

    <p class="sejabemvindo">
      - Seja bem vindo. -
    </p>

  </div>

  <!-- CARDS -->
  <div class="cards_brownies">

    <!-- CARD 1 -->
    <div class="card_brownie">

      <img class="brownies" src="imgs/brownieoreo.png" alt="Brownie de Oreo">

      <p class="texto_ilustrativo">
        *Imagem ilustrativa*
      </p>

      <div class="preco_brownie">

        <span class="texto_preco">
          A partir de
        </span>

        <h2>
          R$ 10,00
        </h2>

      </div>

      <button class="btn btn-warning fw-bold px-4 py-2 rounded-pill" id="btnAgendar">
        Agendar
      </button>

    </div>

    <!-- CARD 2 -->
    <div class="card_brownie">

      <img class="brownies" src="imgs/em_breve.png" alt="Em breve">

      <button class="btn btn-secondary fw-bold px-4 py-2 rounded-pill em_breve_button">
        Em breve
      </button>

    </div>

  </div>

    <!-- GALERIA -->
  <div class="galeria_section">

    <h2 class="galeria_titulo">Nossos Brownies 🍫</h2>
    <p class="galeria_subtitulo">Feitos com amor e muito chocolate</p>

    <div id="carrosselBrownies" class="carousel slide galeria_carrossel" data-bs-ride="carousel">

      <div class="carousel-indicators">
        <button type="button" data-bs-target="#carrosselBrownies" data-bs-slide-to="0" class="active"></button>
        <button type="button" data-bs-target="#carrosselBrownies" data-bs-slide-to="1"></button>
      </div>

      <div class="carousel-inner galeria_inner">

        <div class="carousel-item active">
          <img src="imgs/foto_real_1.png" class="galeria_img" alt="Brownie de Oreo">
          <div class="carousel-caption galeria_legenda">
            <p>Brownie de Oreo</p>
          </div>
        </div>

        <div class="carousel-item">
          <img src="imgs/foto_real_2.png" class="galeria_img" alt="Brownie de Oreo">
          <div class="carousel-caption galeria_legenda">
            <p>Brownie de Oreo</p>
          </div>
        </div>

      </div>

      <button class="carousel-control-prev" type="button" data-bs-target="#carrosselBrownies" data-bs-slide="prev">
        <span class="carousel-control-prev-icon"></span>
      </button>

      <button class="carousel-control-next" type="button" data-bs-target="#carrosselBrownies" data-bs-slide="next">
        <span class="carousel-control-next-icon"></span>
      </button>

    </div>

  </div>

 
  <!-- SCRIPTS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

  <script type="module" src="jss/inicial.js"></script>

  <script>
    const _h = document.getElementById('navHamburger');
    const _d = document.getElementById('navDrawer');
    const _o = document.getElementById('navOverlay');
    const _c = document.getElementById('navDrawerClose');
    function _open() { _d.classList.add('aberto'); _o.classList.add('visivel'); }
    function _close() { _d.classList.remove('aberto'); _o.classList.remove('visivel'); }
    _h.addEventListener('click', _open);
    _c.addEventListener('click', _close);
    _o.addEventListener('click', _close);
  </script>

</body>

</html>

<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Admin</title>

  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/navbar.css">
  <link rel="stylesheet" href="css/inicial.css">
  <link rel="stylesheet" href="css/admin.css">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="imgs/logo.png">
</head>

<body class="imginicial" style="display:none;">

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">

      <a class="navbar-brand" href="inicial.html">
        <img src="imgs/logo.png" alt="Logo" class="logo-navbar">
      </a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="menu">
        <ul class="navbar-nav ms-auto align-items-center">
          <li class="nav-item">
            <a class="nav-link active" href="inicial.html">Página Inicial</a>
          </li>
          <li class="nav-item">
            <a class="btn btn-danger ms-lg-3 mt-2 mt-lg-0" href="index.html">Sair</a>
          </li>
        </ul>
      </div>

    </div>
  </nav>

  <div class="container mt-5">

    <h1 class="titulo text-center">Painel Administrativo</h1>
    <p class="sejabemvindo text-center">Gerencie os pedidos dos clientes</p>

    <!-- DASHBOARD -->
    <div class="dashboard-grid">

      <div class="dashboard-card">
        <h5>Total Pedidos</h5>
        <span id="totalPedidos">0</span>
      </div>

      <div class="dashboard-card aprovado">
        <h5>Aprovados</h5>
        <span id="totalAprovados">0</span>
      </div>

      <div class="dashboard-card pendente">
        <h5>Pendentes</h5>
        <span id="totalPendentes">0</span>
      </div>

      <div class="dashboard-card faturamento">
        <h5>Faturamento</h5>
        <span id="faturamentoTotal">R$ 0</span>
      </div>

      <div class="dashboard-card">
        <h5>Brownies Vendidos</h5>
        <span id="browniesVendidos">0</span>
      </div>

    </div>

    <!-- FILTROS -->
    <div class="filtros_admin">

      <div class="filtro_item">
        <span class="filtro_icone">🔍</span>
        <input type="text" id="buscarPedido" class="filtro_input" placeholder="Buscar cliente...">
      </div>

      <div class="filtro_item">
        <span class="filtro_icone">📦</span>
        <select id="filtroStatus" class="filtro_input">
          <option value="Todos">Todos os status</option>
          <option value="Aprovado">✓ Aprovado</option>
          <option value="Pendente">⏳ Pendente</option>
          <option value="Cancelado">✕ Cancelado</option>
        </select>
      </div>

      <div class="filtro_separador"></div>

      <!-- BOTÕES DE PERÍODO -->
      <div class="filtro_periodos">
        <button class="btn_periodo ativo" data-periodo="todos">Todos</button>
        <button class="btn_periodo" data-periodo="hoje">Hoje</button>
        <button class="btn_periodo" data-periodo="semana">Esta semana</button>
        <button class="btn_periodo" data-periodo="mes">Este mês</button>
        <button id="btnNotificar" class="btn btn-success">

          📢 Avisar brownies disponíveis!

        </button>
      </div>

    </div>

  </div>

  <!-- PEDIDOS -->
  <div class="container mt-4 pb-5">
    <div id="listaAdmin" class="lista_admin"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="jss/admin.js"></script>

</body>

</html>

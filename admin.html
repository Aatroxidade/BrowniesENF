    <div class="container-fluid">

      <a class="navbar-brand" href="inicial.html">

        <img
          src="imgs/logo.png"
          alt="Logo"
          class="logo-navbar"
        >

      </a>

      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#menu"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="menu">

        <ul class="navbar-nav ms-auto align-items-center">

          <li class="nav-item">

          <li class="nav-item">

              href="index.html"

              Sair

        </ul>

      </div>

    </div>

  </nav>

  <!-- TÍTULO -->
  <div class="container mt-5">

    <h1 class="titulo text-center">
      Painel Administrativo
    </h1>

    <p class="sejabemvindo text-center">
      Gerencie os pedidos dos clientes
    </p>

    <!-- DASHBOARD -->
<div class="container mt-5">

  <div class="dashboard-grid">

    <div class="dashboard-card">
      <h5>Total Pedidos</h5>
      <span id="totalPedidos">0</span>
    </div>

    <div class="dashboard-card aprovado">
      <h5>Aprovados</h5>
      <span id="totalAprovados">0</span>
    </div>

    <div class="dashboard-card pendente">
      <h5>Pendentes</h5>
      <span id="totalPendentes">0</span>
    </div>

    <div class="dashboard-card faturamento">
      <h5>Faturamento</h5>
      <span id="faturamentoTotal">R$ 0</span>
    </div>

  </div>

  <div class="filtros_admin">

    <input
      type="text"
      id="buscarPedido"
      class="form-control"
      placeholder="Buscar cliente..."
    >

    <select
      id="filtroStatus"
      class="form-select"
    >

      <option value="Todos">Todos</option>
      <option value="Aprovado">Aprovado</option>
      <option value="Pendente">Pendente</option>
      <option value="Cancelado">Cancelado</option>

    </select>

  </div>

</div>

  </div>

  <div class="text-center mb-4">

 

</div>

  <!-- PEDIDOS -->
  <div class="container mt-5">

    <div id="listaAdmin" class="lista_admin"></div>

  </div>

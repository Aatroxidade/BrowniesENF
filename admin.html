<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Admin</title>

  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/navbar.css">
  <link rel="stylesheet" href="css/inicial.css">
  <link rel="stylesheet" href="css/admin.css">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="imgs/logo.png">
</head>

<body class="imginicial" style="display:none;">

  <!-- NAVBAR -->
  <div class="nav-wrapper">
  <nav class="navbar navbar-dark">
    <div class="container-fluid">

      <a class="navbar-brand" href="inicial.html">
        <img src="imgs/logo.png" alt="Logo" class="logo-navbar">
      </a>

      <button class="nav-hamburger" id="navHamburger">
        <span></span><span></span><span></span>
      </button>

    </div>
  </nav>

  <!-- DRAWER -->
  <div class="nav-drawer" id="navDrawer">
    <button class="nav-drawer-close" id="navDrawerClose">✕</button>
    <a class="nav-link" href="inicial.html">Página Inicial</a>
    <a class="nav-btn nav-btn-danger" href="index.html">Sair</a>
  </div>

  <!-- OVERLAY -->
  <div class="nav-overlay" id="navOverlay"></div>
  </div><!-- /nav-wrapper -->

  <div class="container mt-5">

    <h1 class="titulo text-center">Painel Administrativo</h1>
    <p class="sejabemvindo text-center">Gerencie os pedidos dos clientes</p>

    <!-- CONTROLE DA LOJA -->
    <div class="loja-controle">

      <div class="loja-status-row">
        <div>
          <h2 class="loja-titulo">Controle da Loja</h2>
          <p class="loja-subtitulo" id="lojaStatusTexto">Carregando...</p>
        </div>
        <button class="btn-loja" id="btnToggleLoja">...</button>
      </div>

      <div class="loja-notif-row">
        <button id="btnNotificar" class="btn-notificar">📢 Avisar brownies disponíveis</button>
      </div>

      <div class="loja-brownies-row">
        <label class="loja-label">Brownies disponíveis</label>
        <div class="loja-input-row">
          <input type="number" id="inputBrownies" class="loja-input" min="0" placeholder="0">
          <button class="btn-salvar-brownies" id="btnSalvarBrownies">Salvar</button>
        </div>
      </div>

    </div>

    <!-- DASHBOARD -->
    <div class="dashboard-grid">

      <div class="dashboard-card">
        <h5>Total Pedidos</h5>
        <span id="totalPedidos">0</span>
      </div>

      <div class="dashboard-card aprovado">
        <h5>Aprovados</h5>
        <span id="totalAprovados">0</span>
      </div>

      <div class="dashboard-card pendente">
        <h5>Pendentes</h5>
        <span id="totalPendentes">0</span>
      </div>

      <div class="dashboard-card faturamento">
        <h5>Faturamento</h5>
        <span id="faturamentoTotal">R$ 0</span>
      </div>

      <div class="dashboard-card">
        <h5>Brownies Vendidos</h5>
        <span id="browniesVendidos">0</span>
      </div>

    </div>

    <!-- FILTROS -->
    <div class="filtros_admin">

      <div class="filtro_item">
        <span class="filtro_icone">🔍</span>
        <input type="text" id="buscarPedido" class="filtro_input" placeholder="Buscar cliente...">
      </div>

      <div class="filtro_item">
        <span class="filtro_icone">📦</span>
        <select id="filtroStatus" class="filtro_input">
          <option value="Todos">Todos os status</option>
          <option value="Aprovado">✓ Aprovado</option>
          <option value="Pendente">⏳ Pendente</option>
          <option value="Cancelado">✕ Cancelado</option>
        </select>
      </div>

      <div class="filtro_separador"></div>

      <!-- BOTÕES DE PERÍODO -->
      <div class="filtro_periodos">
        <button class="btn_periodo ativo" data-periodo="todos">Todos</button>
        <button class="btn_periodo" data-periodo="hoje">Hoje</button>
        <button class="btn_periodo" data-periodo="semana">Esta semana</button>
        <button class="btn_periodo" data-periodo="mes">Este mês</button>
      </div>

      <div class="filtro_item">
        <span class="filtro_icone">📅</span>
        <select id="filtroMesAno" class="filtro_input">
          <option value="">Mês específico</option>
        </select>
      </div>

    </div>

  </div>

  <!-- PEDIDOS -->
  <div class="container mt-4 pb-5">
    <div id="listaAdmin" class="lista_admin"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="jss/admin.js"></script>

  <script>
    const _h = document.getElementById('navHamburger');
    const _d = document.getElementById('navDrawer');
    const _o = document.getElementById('navOverlay');
    const _c = document.getElementById('navDrawerClose');
    function _open() { _d.classList.add('aberto'); _o.classList.add('visivel'); }
    function _close() { _d.classList.remove('aberto'); _o.classList.remove('visivel'); }
    _h.addEventListener('click', _open);
    _c.addEventListener('click', _close);
    _o.addEventListener('click', _close);
  </script>

</body>

</html>
